name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping project fuji-xe5-agent
        run: |
          echo "Pinging project fuji-xe5-agent: ${{ secrets.SUPABASE_URL_1 }}"
          curl "${{ secrets.SUPABASE_URL_1 }}/health"
          curl "${{ secrets.SUPABASE_URL_1 }}/health"

      - name: Ping project fuji-field-guide
        run: |
          echo "Pinging project fuji-field-guide: ${{ secrets.SUPABASE_URL_2 }}"
          curl "${{ secrets.SUPABASE_URL_2 }}/health"
          curl "${{ secrets.SUPABASE_URL_2 }}/health"

      - name: Ping project Japan Planner
        run: |
          echo "Pinging project Japan Planner: ${{ secrets.SUPABASE_URL_3 }}/health"
          curl "${{ secrets.SUPABASE_URL_3 }}/health"
          curl "${{ secrets.SUPABASE_URL_2 }}/health"
