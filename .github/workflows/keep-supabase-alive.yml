name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping fuji-xe5-agent
        run: curl "${{ secrets.SUPABASE_URL_1 }}/health"

      - name: Ping fuji-field-guide
        run: curl "${{ secrets.SUPABASE_URL_2 }}/health"

      - name: Ping japan-planner
        run: curl "${{ secrets.SUPABASE_URL_3 }}/health"
